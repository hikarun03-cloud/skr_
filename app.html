<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計帳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&display=swap');

:root{
  --paper: #F5EDED;
  --surface: #FFFFFF;
  --rose-pale: #FFE8E8;
  --rose: #F0D4D4;
  --sage: #D4E2E2;
  --mauve: #E8D6D7;
  --cloud: #F5EDED;
  --ink: #4A4040;
  --ink-soft: rgba(74,64,64,0.58);
  --primary: #B98186;
  --hanko: #C98A90;
  --moss: #7FA39F;
  --gold: #B98A8C;
  --line: rgba(185,129,134,0.16);
  --shadow: 0 10px 30px rgba(185,129,134,0.12);
}
*{box-sizing:border-box;}
body{
  margin:0;
  background: var(--paper);
  background-image:
    radial-gradient(ellipse 480px 260px at 100% 0%, rgba(240,212,212,0.55), transparent 60%),
    radial-gradient(ellipse 420px 240px at 0% 100%, rgba(212,226,226,0.45), transparent 60%);
  background-attachment: fixed;
  font-family:'Kiwi Maru', serif;
  color: var(--ink);
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding: 22px 12px;
}
.page{
  width:100%;
  max-width:480px;
  background: var(--surface);
  border-radius: 26px;
  box-shadow: var(--shadow);
  padding: 30px 24px 34px;
  margin-bottom: 78px;
  position:relative;
  overflow:hidden;
}
.page::before{
  content:"";
  position:absolute;
  top:-60px; right:-60px;
  width:160px; height:160px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(255,232,232,0.9), rgba(255,232,232,0) 70%);
  pointer-events:none;
}
header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:22px;
  padding-bottom:16px;
  border-bottom: 1px solid var(--line);
  position:relative;
}
h1{
  font-family:'Kiwi Maru', serif;
  font-weight:500;
  font-size:24px;
  letter-spacing:0.14em;
  margin:0;
  color: var(--primary);
}
.month-nav{
  display:flex; align-items:center; gap:8px;
  font-family:'Kiwi Maru', serif;
  font-weight:400;
  font-size:14px;
  color: var(--ink);
}
.month-nav button{
  background: var(--rose-pale); border:none; color: var(--primary);
  width:26px;height:26px;border-radius:50%;
  font-size:14px; cursor:pointer; line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.summary{
  display:flex; gap:8px;
  margin-bottom: 22px;
}
.summary .cell{
  flex:1;
  text-align:center;
  padding: 14px 4px;
  border-radius:16px;
  background: var(--cloud);
}
.summary .income{ background: rgba(212,226,226,0.55); }
.summary .expense{ background: rgba(255,232,232,0.7); }
.summary .balance{ background: rgba(232,214,215,0.55); }
.summary .label{
  font-size:11px; letter-spacing:0.12em; color:var(--ink-soft);
}
.summary .value{
  font-family:'Kiwi Maru', serif;
  font-size:18px; font-weight:500; margin-top:5px;
}
.summary .income .value{ color: var(--moss); }
.summary .expense .value{ color: var(--hanko); }
.summary .balance .value{ color: var(--primary); }

.breakdown{
  margin-bottom: 24px;
}
.breakdown h2, .ledger h2{
  display:inline-block;
  font-family:'Kiwi Maru', serif;
  font-size:11px;
  font-weight:500;
  color: var(--primary);
  letter-spacing:0.16em;
  margin: 0 0 12px 0;
  background: var(--rose-pale);
  padding: 4px 12px;
  border-radius: 20px;
}
.bar-row{
  display:flex; align-items:center; gap:8px; margin-bottom:9px; font-size:12px;
}
.bar-row .cat-name{ width:68px; flex-shrink:0; color:var(--ink-soft); line-height:1.3; }
.bar-track{ flex:1; height:8px; background: var(--cloud); border-radius:5px; overflow:hidden; }
.bar-fill{ height:100%; background: linear-gradient(90deg, var(--rose), var(--hanko)); border-radius:5px; }
.bar-row .cat-amt{ width:62px; text-align:right; flex-shrink:0; font-variant-numeric: tabular-nums; }

form{
  background: var(--cloud);
  border:none;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 26px;
}
.type-toggle{
  display:flex; gap:0; margin-bottom:12px;
  background:#fff; border-radius:20px; overflow:hidden;
  padding:3px;
}
.type-toggle button{
  flex:1; padding:8px 0; border:none; border-radius:18px; background:transparent;
  font-family:'Kiwi Maru', serif; font-weight:500; font-size:13px;
  color: var(--ink-soft); cursor:pointer;
}
.type-toggle button.active.expense{ background: var(--hanko); color:#fff; }
.type-toggle button.active.income{ background: var(--moss); color:#fff; }

.form-row{ display:flex; gap:8px; margin-bottom:8px; }
.form-row input, .form-row select{
  flex:1; min-width:0;
  padding: 10px 11px;
  border:none;
  border-radius:12px;
  background:#fff;
  font-family:'Kiwi Maru', serif;
  font-size:13px;
  color: var(--ink);
}
.add-btn{
  width:100%;
  padding:11px 0;
  border:none;
  border-radius:20px;
  background: var(--primary);
  color:#fff;
  font-family:'Kiwi Maru', serif;
  font-weight:500;
  font-size:14px;
  letter-spacing:0.12em;
  cursor:pointer;
}
.add-btn:active{ opacity:0.85; }

.ledger-row{
  display:flex; align-items:center; gap:10px;
  padding: 10px 0;
  border-bottom:1px solid var(--line);
}
.stamp{
  width:32px;height:32px;flex-shrink:0;
  border-radius:50%;
  border:none;
  background: var(--rose-pale);
  color: var(--hanko);
  display:flex;align-items:center;justify-content:center;
  font-family:'Kiwi Maru', serif;
  font-weight:500; font-size:14px;
}
.stamp.income{ background: rgba(212,226,226,0.7); color:var(--moss); }
.stamp.stamp-in{ animation: stampIn 0.4s ease-out; }
@keyframes stampIn{
  0%{ transform: scale(0.3); opacity:0; }
  70%{ transform: scale(1.12); opacity:1; }
  100%{ transform: scale(1); opacity:1; }
}
.row-main{ flex:1; min-width:0; }
.row-memo{ font-size:13px; color:var(--ink); }
.row-date{ font-size:11px; color:var(--ink-soft); margin-top:2px; }
.row-amt{
  font-family:'Kiwi Maru', serif;
  font-weight:500; font-size:15px;
  flex-shrink:0;
  font-variant-numeric: tabular-nums;
}
.row-amt.expense{ color:var(--hanko); }
.row-amt.income{ color:var(--moss); }
.row-del{
  flex-shrink:0; width:20px;height:20px; border-radius:50%;
  border:none; background: var(--cloud); color:var(--ink-soft);
  font-size:12px; cursor:pointer;
}
.empty{
  text-align:center; padding:32px 0; color:var(--ink-soft); font-size:13px;
}

.split-settings, .fixed-costs, .category-manage{ margin-bottom: 18px; }
.settings-toggle{
  background: none; border:none; padding:4px 2px;
  font-family:'Kiwi Maru', serif;
  font-size:12px; color: var(--primary);
  text-decoration: none;
  border-bottom: 1px dotted var(--primary);
  cursor:pointer;
}
.settings-panel{
  margin-top:12px;
  border:none;
  border-radius:16px;
  padding: 14px;
  background: var(--cloud);
}
.settings-row{
  display:flex; align-items:center; gap:8px;
  padding: 7px 0;
  border-bottom:1px solid var(--line);
  font-size:13px;
}
.settings-row:last-child{ border-bottom:none; }
.settings-row .cat-name{ flex:1; }
.settings-row .share-input{
  width:48px; padding:5px 6px; border:none;
  border-radius:8px; font-size:12px; text-align:right; background:#fff;
}
.settings-row .share-label{ font-size:11px; color:var(--ink-soft); }

.request-card{
  border: none;
  border-radius: 20px;
  padding: 18px 16px;
  margin-bottom: 24px;
  text-align:center;
  background: linear-gradient(135deg, rgba(255,232,232,0.9), rgba(232,214,215,0.7));
}
.request-card h2{
  font-family:'Kiwi Maru', serif;
  font-size:12px; font-weight:500;
  color: var(--primary); letter-spacing:0.14em;
  margin:0 0 8px 0;
}
.request-amount{
  font-family:'Kiwi Maru', serif;
  font-size:32px; font-weight:500;
  color: var(--gold);
  margin-bottom:12px;
}
.copy-btn{
  border:none; background:#fff; color: var(--primary);
  padding:8px 20px; border-radius:20px;
  font-family:'Kiwi Maru', serif;
  font-weight:500; font-size:12px; cursor:pointer;
}
.copy-btn.copied{ background: var(--primary); color:#fff; }

.fixed-item{
  border:none;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  background:#fff;
}
.fixed-item-row{ display:flex; align-items:center; gap:6px; margin-bottom:7px; }
.fixed-item-row:last-child{ margin-bottom:0; }
.fixed-item input[type=text], .fixed-item input[type=number], .fixed-item select{
  min-width:0; padding:7px 8px; border:1px solid var(--line);
  border-radius:10px; font-size:12px; background:#fff; color:var(--ink);
  font-family:'Kiwi Maru', serif;
}
.fixed-item .fx-name{ flex:1.4; }
.fixed-item .fx-amount{ flex:1; }
.fixed-item .fx-category{ flex:1.3; }
.fixed-item .fx-interval{ width:44px; flex:none; }
.fixed-item .fx-share{ width:50px; flex:none; text-align:right; }
.fixed-item .field-label{ font-size:10px; color:var(--ink-soft); white-space:nowrap; flex:none; }
.fixed-item .quick-btns{ display:flex; gap:4px; margin-left:auto; }
.fixed-item .quick-btn{
  padding:4px 8px; border:1px solid var(--gold); background:none; color:var(--gold);
  border-radius:20px; font-size:11px; cursor:pointer; white-space:nowrap;
}
.fixed-item .quick-btn.active{ background:var(--gold); color:#fff; border-color:var(--gold); }
.fixed-item .fixed-del{
  border:none; background:none; color:var(--hanko); font-size:11px; cursor:pointer;
  text-decoration:none; border-bottom:1px dotted var(--hanko); flex:none;
}
.add-fixed-btn{
  width:100%; padding:9px 0; border:1px dashed var(--line); background:none; color:var(--ink-soft);
  border-radius:20px; font-size:12px; cursor:pointer; margin-bottom:10px;
}
.generate-btn{
  width:100%; padding:11px 0; border:none; border-radius:20px;
  background: var(--moss); color:#fff; font-family:'Kiwi Maru', serif;
  font-weight:500; font-size:13px; cursor:pointer;
}
.generate-btn.done{ background: var(--ink-soft); }

.cat-manage-row{ display:flex; align-items:center; gap:6px; margin-bottom:7px; }
.cat-manage-row:last-child{ margin-bottom:0; }
.cat-manage-row .cat-rename{
  flex:1; padding:7px 8px; border:1px solid var(--line);
  border-radius:10px; font-size:12px; background:#fff; color:var(--ink);
  font-family:'Kiwi Maru', serif;
}
.cat-del{
  flex:none; border:none; background:none; color:var(--hanko); font-size:11px;
  cursor:pointer; text-decoration:none; border-bottom:1px dotted var(--hanko);
}
.cat-manage-group + .cat-manage-group{ margin-top:18px; }

.section-label{
  display:inline-block;
  font-family:'Kiwi Maru', serif;
  font-size:11px;
  font-weight:500;
  color: var(--primary);
  letter-spacing:0.16em;
  margin: 0 0 12px 0;
  background: var(--rose-pale);
  padding: 4px 12px;
  border-radius: 20px;
}

.tabbar{
  position: fixed;
  left:0; right:0; bottom:0;
  display:flex; justify-content:center;
  z-index: 50;
  pointer-events:none;
}
.tabbar-inner{
  pointer-events:auto;
  width:100%;
  max-width:480px;
  display:flex;
  gap:4px;
  background: var(--surface);
  box-shadow: 0 -8px 24px rgba(185,129,134,0.14);
  border-radius: 22px 22px 0 0;
  padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
  margin: 0 12px;
}
.tab-btn{
  flex:1;
  border:none;
  background:transparent;
  border-radius:16px;
  padding: 9px 0;
  font-family:'Kiwi Maru', serif;
  font-weight:500;
  font-size:12px;
  color: var(--ink-soft);
  cursor:pointer;
}
.tab-btn.active{
  background: var(--rose-pale);
  color: var(--primary);
}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>家計帳</h1>
    <div class="month-nav">
      <button id="prevMonth">‹</button>
      <span id="monthLabel"></span>
      <button id="nextMonth">›</button>
    </div>
  </header>

  <div class="tab-panel" data-tab="ledger" id="tabLedger">
    <div class="summary">
      <div class="cell income"><div class="label">収入</div><div class="value" id="sumIncome">¥0</div></div>
      <div class="cell expense"><div class="label">支出</div><div class="value" id="sumExpense">¥0</div></div>
      <div class="cell balance"><div class="label">残高</div><div class="value" id="sumBalance">¥0</div></div>
    </div>

    <div class="breakdown">
      <h2>内訳</h2>
      <div id="breakdownList"></div>
    </div>

    <div class="request-card">
      <h2>パートナーへの請求（今月）</h2>
      <div class="request-amount" id="requestAmount">¥0</div>
      <button type="button" id="copyRequest" class="copy-btn">金額をコピー</button>
    </div>

    <form id="entryForm">
      <div class="type-toggle">
        <button type="button" class="active expense" data-type="expense">支出</button>
        <button type="button" class="income" data-type="income">収入</button>
      </div>
      <div class="form-row">
        <select id="category"></select>
        <input type="number" id="amount" placeholder="金額" min="0" required>
      </div>
      <div class="form-row">
        <input type="text" id="memo" placeholder="内容（例：スコーンの材料）">
        <input type="date" id="date">
      </div>
      <button type="submit" class="add-btn">記帳する</button>
    </form>

    <div class="ledger">
      <h2>記録</h2>
      <div id="ledgerList"></div>
    </div>
  </div>

  <div class="tab-panel" data-tab="fixed" id="tabFixed" style="display:none;">
    <div class="section-label">固定費</div>
    <div id="fixedList"></div>
    <button type="button" id="addFixedItem" class="add-fixed-btn">＋ 項目を追加</button>
    <button type="button" id="generateFixed" class="generate-btn">今月の固定費を記帳する</button>
  </div>

  <div class="tab-panel" data-tab="settings" id="tabSettings" style="display:none;">
    <div class="cat-manage-group">
      <div class="section-label">支出項目</div>
      <div id="expenseCatList"></div>
      <button type="button" id="addExpenseCat" class="add-fixed-btn">＋ 支出項目を追加</button>
    </div>
    <div class="cat-manage-group">
      <div class="section-label">収入項目</div>
      <div id="incomeCatList"></div>
      <button type="button" id="addIncomeCat" class="add-fixed-btn">＋ 収入項目を追加</button>
    </div>
    <div class="cat-manage-group">
      <div class="section-label">分担設定</div>
      <div id="settingsPanel" class="settings-panel"></div>
    </div>
  </div>
</div>

<div class="tabbar">
  <div class="tabbar-inner">
    <button type="button" class="tab-btn active" data-tab="ledger">記帳</button>
    <button type="button" class="tab-btn" data-tab="fixed">固定費</button>
    <button type="button" class="tab-btn" data-tab="settings">設定</button>
  </div>
</div>

<script>
let EXPENSE_CATS = [];
let INCOME_CATS = [];
function defaultExpenseCategories(){
  return ['家賃','趣味','必要なもの','ぽめ','ねこ','医療','くるま','ぽめに支払い'];
}
function defaultIncomeCategories(){
  return ['収入'];
}

let entries = [];
let currentType = 'expense';
let viewDate = new Date();
let lastAddedId = null;
let categorySettings = {};
let lastRequestTotal = 0;
let fixedItems = [];

const $ = (sel) => document.querySelector(sel);
const categorySelect = $('#category');
const dateInput = $('#date');

function fmtYen(n){
  return '¥' + Math.round(n).toLocaleString('ja-JP');
}
function monthKey(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function stampFor(category, type){
  if(category) return category.charAt(0);
  return type==='income' ? '収' : '他';
}

function renderCategoryOptions(){
  const cats = currentType==='expense' ? EXPENSE_CATS : INCOME_CATS;
  categorySelect.innerHTML = cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function updateTypeToggle(){
  document.querySelectorAll('.type-toggle button').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.type===currentType);
  });
  renderCategoryOptions();
}

function currentMonthEntries(){
  const mk = monthKey(viewDate);
  return entries.filter(e => e.date.slice(0,7) === mk);
}

function render(){
  $('#monthLabel').textContent = `${viewDate.getFullYear()}年${viewDate.getMonth()+1}月`;

  const monthEntries = currentMonthEntries();
  const income = monthEntries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const expense = monthEntries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  $('#sumIncome').textContent = fmtYen(income);
  $('#sumExpense').textContent = fmtYen(expense);
  $('#sumBalance').textContent = fmtYen(income-expense);

  // breakdown
  const byCat = {};
  monthEntries.filter(e=>e.type==='expense').forEach(e=>{
    byCat[e.category] = (byCat[e.category]||0) + e.amount;
  });
  // パートナーへの請求額（固定費由来はbillShareを優先、それ以外は分担設定に従う）
  let requestTotal = 0;
  monthEntries.filter(e=>e.type==='expense').forEach(e=>{
    if(typeof e.billShare === 'number'){
      requestTotal += e.amount * (e.billShare/100);
    } else {
      const s = categorySettings[e.category];
      if(s && s.billable){
        requestTotal += e.amount * (s.share/100);
      }
    }
  });
  lastRequestTotal = requestTotal;
  $('#requestAmount').textContent = fmtYen(requestTotal);

  const maxCat = Math.max(1, ...Object.values(byCat));
  const breakdownList = $('#breakdownList');
  if(Object.keys(byCat).length===0){
    breakdownList.innerHTML = `<div class="empty">この月の支出はまだありません</div>`;
  } else {
    breakdownList.innerHTML = Object.entries(byCat)
      .sort((a,b)=>b[1]-a[1])
      .map(([cat,amt])=>`
        <div class="bar-row">
          <div class="cat-name">${cat}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(amt/maxCat*100).toFixed(0)}%"></div></div>
          <div class="cat-amt">${fmtYen(amt)}</div>
        </div>
      `).join('');
  }

  // ledger
  const ledgerList = $('#ledgerList');
  const sorted = [...monthEntries].sort((a,b)=> b.date.localeCompare(a.date) || b.id - a.id);
  if(sorted.length===0){
    ledgerList.innerHTML = `<div class="empty">まだ記帳がありません</div>`;
  } else {
    ledgerList.innerHTML = sorted.map(e=>`
      <div class="ledger-row">
        <div class="stamp ${e.type} ${e.id===lastAddedId?'stamp-in':''}">${stampFor(e.category, e.type)}</div>
        <div class="row-main">
          <div class="row-memo">${e.memo ? e.memo : e.category}</div>
          <div class="row-date">${e.date.slice(5).replace('-','/')}　${e.category}${typeof e.billShare==='number' ? '　固定費' : ''}</div>
        </div>
        <div class="row-amt ${e.type}">${e.type==='income'?'+':'−'}${fmtYen(e.amount)}</div>
        <button class="row-del" data-id="${e.id}">×</button>
      </div>
    `).join('');
  }
  lastAddedId = null;
}

// 想定外のエラーが画面に表示されないよう抑制する
window.addEventListener('unhandledrejection', function(e){ e.preventDefault(); });
window.addEventListener('error', function(e){ e.preventDefault(); });

let cloudStorageOK = null; // null=未判定, true/false=判定済み

async function detectCloudStorage(){
  if (cloudStorageOK !== null) return cloudStorageOK;
  try{
    if (typeof window.storage === 'undefined' || !window.storage){
      cloudStorageOK = false;
      return false;
    }
    await window.storage.set('__probe__', '1');
    cloudStorageOK = true;
  }catch(err){
    cloudStorageOK = false;
  }
  return cloudStorageOK;
}

async function storageGet(key){
  const ok = await detectCloudStorage();
  if (ok){
    try{
      const res = await window.storage.get(key);
      return res ? res.value : null;
    }catch(err){
      cloudStorageOK = false; // 以後はlocalStorageのみ使う
    }
  }
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}

async function storageSet(key, value){
  const ok = await detectCloudStorage();
  if (ok){
    try{
      await window.storage.set(key, value);
      return;
    }catch(err){
      cloudStorageOK = false; // 以後はlocalStorageのみ使う
    }
  }
  try{ localStorage.setItem(key, value); }catch(e){ /* 何もできない場合は諦める */ }
}

async function loadEntries(){
  try{
    const raw = await storageGet('entries');
    entries = raw ? JSON.parse(raw) : [];
  }catch(err){
    entries = [];
  }
  render();
}
async function saveEntries(){
  try{
    await storageSet('entries', JSON.stringify(entries));
  }catch(err){
    // ここに来ても画面上は何も表示しない（次回操作は継続できる）
  }
}

function defaultSettings(){
  const s = {};
  EXPENSE_CATS.forEach(c=>{ s[c] = {billable:false, share:50}; });
  return s;
}
async function loadSettingsData(){
  try{
    const raw = await storageGet('categorySettings');
    categorySettings = raw ? JSON.parse(raw) : defaultSettings();
  }catch(err){
    categorySettings = defaultSettings();
  }
  EXPENSE_CATS.forEach(c=>{
    if(!categorySettings[c]) categorySettings[c] = {billable:false, share:50};
  });
}
async function saveSettingsData(){
  try{ await storageSet('categorySettings', JSON.stringify(categorySettings)); }catch(err){}
}
function renderSettingsPanel(){
  const panel = $('#settingsPanel');
  panel.innerHTML = EXPENSE_CATS.map(c=>{
    const s = categorySettings[c] || {billable:false, share:50};
    return `
      <div class="settings-row">
        <input type="checkbox" class="billable-check" data-cat="${c}" ${s.billable?'checked':''}>
        <div class="cat-name">${c}</div>
        <input type="number" class="share-input" data-cat="${c}" value="${s.share}" min="0" max="100" ${s.billable?'':'disabled'}>
        <div class="share-label">%請求</div>
      </div>
    `;
  }).join('');
}

function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadCategoryLists(){
  try{
    const raw = await storageGet('categories');
    const parsed = raw ? JSON.parse(raw) : null;
    EXPENSE_CATS = (parsed && parsed.expense && parsed.expense.length) ? parsed.expense : defaultExpenseCategories();
    INCOME_CATS = (parsed && parsed.income && parsed.income.length) ? parsed.income : defaultIncomeCategories();
  }catch(err){
    EXPENSE_CATS = defaultExpenseCategories();
    INCOME_CATS = defaultIncomeCategories();
  }
}
async function saveCategoryLists(){
  try{ await storageSet('categories', JSON.stringify({expense:EXPENSE_CATS, income:INCOME_CATS})); }catch(err){}
}

function uniqueCategoryName(list, base){
  let name = base, n = 2;
  while(list.includes(name)){ name = `${base}${n}`; n++; }
  return name;
}

async function refreshAfterCategoryChange(){
  await saveCategoryLists();
  renderCategoryOptions();
  renderCategoryManagePanel();
  renderSettingsPanel();
  renderFixedPanel();
  render();
}

async function addCategory(type){
  const list = type==='expense' ? EXPENSE_CATS : INCOME_CATS;
  const name = uniqueCategoryName(list, '新しい項目');
  list.push(name);
  if(type==='expense') categorySettings[name] = {billable:false, share:50};
  await saveSettingsData();
  await refreshAfterCategoryChange();
}

async function deleteCategory(type, name){
  const list = type==='expense' ? EXPENSE_CATS : INCOME_CATS;
  if(list.length <= 1) return; // 最低1項目は残す
  const idx = list.indexOf(name);
  if(idx === -1) return;
  list.splice(idx, 1);
  if(type==='expense' && categorySettings[name]){
    delete categorySettings[name];
    await saveSettingsData();
  }
  await refreshAfterCategoryChange();
}

async function renameCategory(type, oldName, newName){
  newName = newName.trim();
  const list = type==='expense' ? EXPENSE_CATS : INCOME_CATS;
  if(!newName || newName===oldName) { renderCategoryManagePanel(); return; }
  if(list.includes(newName)){ renderCategoryManagePanel(); return; } // 同名は不可
  const idx = list.indexOf(oldName);
  if(idx === -1) return;
  list[idx] = newName;

  // 記帳済みデータの表記も追従させる
  entries.forEach(e=>{ if(e.type===type && e.category===oldName) e.category = newName; });
  await saveEntries();

  if(type==='expense'){
    if(categorySettings[oldName]){
      categorySettings[newName] = categorySettings[oldName];
      delete categorySettings[oldName];
      await saveSettingsData();
    }
    fixedItems.forEach(item=>{ if(item.category===oldName) item.category = newName; });
    await saveFixedItems();
  }
  await refreshAfterCategoryChange();
}

function renderCategoryManagePanel(){
  const expList = $('#expenseCatList');
  const incList = $('#incomeCatList');
  expList.innerHTML = EXPENSE_CATS.map(c=>`
    <div class="cat-manage-row">
      <input type="text" class="cat-rename" data-type="expense" data-old="${escapeHtml(c)}" value="${escapeHtml(c)}">
      <button type="button" class="cat-del" data-type="expense" data-name="${escapeHtml(c)}">削除</button>
    </div>
  `).join('');
  incList.innerHTML = INCOME_CATS.map(c=>`
    <div class="cat-manage-row">
      <input type="text" class="cat-rename" data-type="income" data-old="${escapeHtml(c)}" value="${escapeHtml(c)}">
      <button type="button" class="cat-del" data-type="income" data-name="${escapeHtml(c)}">削除</button>
    </div>
  `).join('');
}

function defaultFixedItems(){
  const mk = monthKey(new Date());
  const mk2 = (name, amount, category, share) => ({
    id: Date.now() + Math.floor(Math.random()*100000),
    name, amount, category, interval:1, share,
    anchorMonth: mk, lastGeneratedMonth: null,
  });
  return [
    mk2('家賃', 64000, '家賃', 50),
    mk2('YouTube', 1070, '必要なもの', 50),
    mk2('LINE', 240, '必要なもの', 50),
    mk2('Apple', 450, '必要なもの', 50),
    mk2('Google', 290, '必要なもの', 50),
    mk2('コープ共済', 2160, '医療', 50),
    mk2('アマプラ', 492, '必要なもの', 50),
    mk2('ぽめに支払い', 17690, 'ぽめに支払い', 0),
  ];
}
async function loadFixedItems(){
  try{
    const raw = await storageGet('fixedItems');
    fixedItems = raw ? JSON.parse(raw) : defaultFixedItems();
  }catch(err){
    fixedItems = defaultFixedItems();
  }
}
async function saveFixedItems(){
  try{ await storageSet('fixedItems', JSON.stringify(fixedItems)); }catch(err){}
}
function renderFixedPanel(){
  const list = $('#fixedList');
  if(fixedItems.length===0){
    list.innerHTML = `<div class="empty">固定費の項目がありません</div>`;
    return;
  }
  list.innerHTML = fixedItems.map(item => `
    <div class="fixed-item">
      <div class="fixed-item-row">
        <input type="text" class="fx-name" data-id="${item.id}" value="${escapeHtml(item.name)}" placeholder="項目名（例：家賃）">
        <input type="number" class="fx-amount" data-id="${item.id}" value="${item.amount}" min="0" placeholder="金額">
      </div>
      <div class="fixed-item-row">
        <select class="fx-category" data-id="${item.id}">
          ${EXPENSE_CATS.map(c=>`<option value="${c}" ${c===item.category?'selected':''}>${c}</option>`).join('')}
        </select>
        <input type="number" class="fx-interval" data-id="${item.id}" value="${item.interval}" min="1">
        <div class="field-label">ヶ月ごと</div>
      </div>
      <div class="fixed-item-row">
        <input type="number" class="fx-share" data-id="${item.id}" value="${item.share}" min="0" max="100">
        <div class="field-label">%請求</div>
        <div class="quick-btns">
          <button type="button" class="quick-btn fx-split ${item.share===50?'active':''}" data-id="${item.id}">折半</button>
          <button type="button" class="quick-btn fx-self ${item.share===0?'active':''}" data-id="${item.id}">わたし負担</button>
        </div>
        <button type="button" class="fixed-del" data-id="${item.id}">削除</button>
      </div>
    </div>
  `).join('');
}
function monthDiff(fromMK, toMK){
  const [fy,fm] = fromMK.split('-').map(Number);
  const [ty,tm] = toMK.split('-').map(Number);
  return (ty-fy)*12 + (tm-fm);
}
async function generateFixedForMonth(){
  const mk = monthKey(viewDate);
  let count = 0;
  fixedItems.forEach((item, idx)=>{
    if(!item.name || !item.amount) return;
    const anchor = item.anchorMonth || mk;
    const diff = monthDiff(anchor, mk);
    if(diff < 0) return;
    if(diff % item.interval !== 0) return;
    if(item.lastGeneratedMonth === mk) return;
    entries.push({
      id: Date.now() + idx,
      type: 'expense',
      category: item.category,
      amount: item.amount,
      memo: item.name,
      date: mk + '-01',
      billShare: item.share,
    });
    item.lastGeneratedMonth = mk;
    count++;
  });
  if(count > 0){
    await saveEntries();
    await saveFixedItems();
  }
  render();
  const btn = $('#generateFixed');
  const original = btn.textContent;
  btn.textContent = count > 0 ? `${count}件を記帳しました` : '対象の固定費はありません';
  btn.classList.add('done');
  setTimeout(()=>{ btn.textContent = original; btn.classList.remove('done'); }, 1800);
}

function switchTab(tab){
  document.querySelectorAll('.tab-panel').forEach(el=>{
    el.style.display = el.dataset.tab === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  if(tab === 'fixed') renderFixedPanel();
  if(tab === 'settings'){ renderCategoryManagePanel(); renderSettingsPanel(); }
  window.scrollTo({top:0, behavior:'auto'});
}
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
});

document.addEventListener('change', async (e)=>{
  if(e.target.classList.contains('billable-check')){
    const cat = e.target.dataset.cat;
    categorySettings[cat].billable = e.target.checked;
    await saveSettingsData();
    renderSettingsPanel();
    render();
  }
  if(e.target.classList.contains('share-input')){
    const cat = e.target.dataset.cat;
    let val = parseFloat(e.target.value);
    if(isNaN(val)) val = 0;
    val = Math.min(100, Math.max(0, val));
    categorySettings[cat].share = val;
    await saveSettingsData();
    render();
  }
  if(e.target.classList.contains('cat-rename')){
    const type = e.target.dataset.type;
    const oldName = e.target.dataset.old;
    await renameCategory(type, oldName, e.target.value);
    return;
  }
  const fxId = Number(e.target.dataset.id);
  if(fxId){
    const item = fixedItems.find(i=>i.id===fxId);
    if(item){
      if(e.target.classList.contains('fx-name')) item.name = e.target.value;
      if(e.target.classList.contains('fx-amount')) item.amount = parseFloat(e.target.value) || 0;
      if(e.target.classList.contains('fx-category')) item.category = e.target.value;
      if(e.target.classList.contains('fx-interval')) item.interval = Math.max(1, parseInt(e.target.value) || 1);
      if(e.target.classList.contains('fx-share')){
        let v = parseFloat(e.target.value);
        if(isNaN(v)) v = 0;
        item.share = Math.min(100, Math.max(0, v));
      }
      await saveFixedItems();
      renderFixedPanel();
    }
  }
});

$('#copyRequest').addEventListener('click', async ()=>{
  const label = `${viewDate.getFullYear()}年${viewDate.getMonth()+1}月分 生活費`;
  const text = `${label} ${fmtYen(lastRequestTotal)}`;
  try{
    await navigator.clipboard.writeText(text);
  }catch(err){
    try{
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }catch(e2){ /* コピーできない環境では何もしない */ }
  }
  const btn = $('#copyRequest');
  const original = btn.textContent;
  btn.textContent = 'コピーしました';
  btn.classList.add('copied');
  setTimeout(()=>{ btn.textContent = original; btn.classList.remove('copied'); }, 1600);
});

document.querySelectorAll('.type-toggle button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentType = btn.dataset.type;
    updateTypeToggle();
  });
});

$('#prevMonth').addEventListener('click', ()=>{
  viewDate.setMonth(viewDate.getMonth()-1);
  render();
});
$('#nextMonth').addEventListener('click', ()=>{
  viewDate.setMonth(viewDate.getMonth()+1);
  render();
});

$('#entryForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const amount = parseFloat($('#amount').value);
  if(!amount || amount<=0) return;
  const entry = {
    id: Date.now(),
    type: currentType,
    category: categorySelect.value,
    amount,
    memo: $('#memo').value.trim(),
    date: dateInput.value || todayStr(),
  };
  entries.push(entry);
  lastAddedId = entry.id;
  await saveEntries();
  $('#amount').value = '';
  $('#memo').value = '';
  viewDate = new Date(entry.date+'T00:00:00');
  render();
});

document.addEventListener('click', async (e)=>{
  if(e.target.classList.contains('row-del')){
    const id = Number(e.target.dataset.id);
    entries = entries.filter(en=>en.id!==id);
    await saveEntries();
    render();
  }
  if(e.target.id === 'addFixedItem'){
    fixedItems.push({
      id: Date.now(), name:'', amount:0,
      category: EXPENSE_CATS[0], interval:1, share:50,
      anchorMonth: monthKey(viewDate), lastGeneratedMonth: null,
    });
    await saveFixedItems();
    renderFixedPanel();
  }
  if(e.target.id === 'generateFixed'){
    await generateFixedForMonth();
  }
  if(e.target.id === 'addExpenseCat'){
    await addCategory('expense');
  }
  if(e.target.id === 'addIncomeCat'){
    await addCategory('income');
  }
  if(e.target.classList.contains('cat-del')){
    const type = e.target.dataset.type;
    const name = e.target.dataset.name;
    await deleteCategory(type, name);
  }
  if(e.target.classList.contains('fixed-del')){
    const id = Number(e.target.dataset.id);
    fixedItems = fixedItems.filter(i=>i.id!==id);
    await saveFixedItems();
    renderFixedPanel();
  }
  if(e.target.classList.contains('fx-split')){
    const id = Number(e.target.dataset.id);
    const item = fixedItems.find(i=>i.id===id);
    if(item){ item.share = 50; await saveFixedItems(); renderFixedPanel(); }
  }
  if(e.target.classList.contains('fx-self')){
    const id = Number(e.target.dataset.id);
    const item = fixedItems.find(i=>i.id===id);
    if(item){ item.share = 0; await saveFixedItems(); renderFixedPanel(); }
  }
});

dateInput.value = todayStr();
(async function init(){
  await loadCategoryLists();
  updateTypeToggle();
  await loadSettingsData();
  await loadFixedItems();
  await loadEntries();
})();
</script>
